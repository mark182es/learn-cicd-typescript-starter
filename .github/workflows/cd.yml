name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6

      - name: Install dependencies
        run: npm ci

      - name: Build the app
        run: npm run build

      - id: auth
        name: Authenticate with Google
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Build docker and push to gcloud
        run: gcloud builds submit --tag europe-west8-docker.pkg.dev/notely-492017/notely-ar-repo/dannmark/notely .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image europe-west8-docker.pkg.dev/notely-492017/notely-ar-repo/dannmark/notely --region europe-west8 --allow-unauthenticated --project notely-492017 --max-instances=4
